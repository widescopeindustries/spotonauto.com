name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        # Use `next build` directly to skip prebuild DB-dependent sitemap generation.
        # The VPS auto-deploy runs the full `npm run build` with Postgres available.
        run: npx next build --webpack

  # NOTE: VPS deployment is handled by the auto-deploy watcher running on
  # the server (auto-deploy.timer + auto-deploy.service). The watcher polls
  # GitHub every 60 seconds and triggers a local build + service restart
  # when new commits are detected. This avoids SSH/rsync race conditions
  # and ensures the service is stopped before build artifacts are cleared.
  #
  # If you need to deploy manually, SSH to the VPS and run:
  #   systemctl start auto-deploy.service
  #
  # deploy:
  #   name: Deploy to VPS
  #   runs-on: ubuntu-latest
  #   needs: verify
  #   ...
