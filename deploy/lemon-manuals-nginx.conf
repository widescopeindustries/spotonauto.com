server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Serve the sitemaps directly
    location ~ /sitemap_manuals_.*\.xml {
        root /data/lemon-manuals;
        add_header Content-Type application/xml;
    }

    location = /sitemap_index_master.xml {
        root /data/lemon-manuals;
        add_header Content-Type application/xml;
    }

    location = /parts_injector.js {
        root /data/lemon-manuals;
    }

    location ^~ /graph-backbone/ {
        alias /data/lemon-manuals/graph-backbone/;
        add_header Cache-Control no-store;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 0;
        proxy_read_timeout 3600;
        proxy_connect_timeout 3600;
        proxy_send_timeout 3600;
        send_timeout 3600;
    }
}
