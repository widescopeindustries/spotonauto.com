server {
    server_name alloemmanuals.com www.alloemmanuals.com;

    # Proxy cache for Next.js pages — drastically reduces SSR load from crawlers
    proxy_cache alloemmanuals_cache;
    proxy_cache_valid 200 301 302 1h;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_methods GET HEAD;
    proxy_cache_key $scheme$request_method$host$request_uri;
    add_header X-Cache-Status $upstream_cache_status always;

    # Rate limit aggressive crawlers (20 req/s per IP burst 50)
    limit_req zone=botlimit burst=50 nodelay;

    location /gallery {
        alias /var/www/gallery.alloemmanuals.com/;
        try_files $uri $uri/ /gallery/index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Do NOT cache API routes — they are fully dynamic
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        send_timeout 180s;
        proxy_cache off;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        send_timeout 180s;

        # Ignore Next.js no-cache headers and cache pages anyway
        proxy_ignore_headers Cache-Control Expires Set-Cookie Vary;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=3600, s-maxage=3600";

        # Bypass cache for authenticated requests
        proxy_cache_bypass $http_authorization;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/alloemmanuals.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/alloemmanuals.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = www.alloemmanuals.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = alloemmanuals.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name alloemmanuals.com www.alloemmanuals.com;
    return 404; # managed by Certbot
}
