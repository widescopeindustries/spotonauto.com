# Bot forwarding: Cloudflare Worker handles proxied traffic. Nginx fallback catches bots that bypass Cloudflare.
# Both layers are active for defense-in-depth.

server {
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    server_name alloemmanuals.com www.alloemmanuals.com;

    # Redirect old domain traffic to canonical domain
    if ($host = spotonauto.com) { return 308 https://alloemmanuals.com$request_uri; }
    if ($host = www.spotonauto.com) { return 308 https://alloemmanuals.com$request_uri; }

    # Origin shield: only Cloudflare edges and localhost can reach origin directly.
    # All other IPs get 444 (connection closed without response) to prevent origin enumeration.
    if ($cloudflare_trusted = 0) { return 444; }

    ssl_certificate /etc/letsencrypt/live/alloemmanuals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alloemmanuals.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Proxy buffer tuning — prevents "upstream sent too big header" errors
    # when maliciously long query strings hit the origin.
    proxy_buffer_size 8k;
    proxy_buffers 8 8k;
    proxy_busy_buffers_size 16k;
    proxy_temp_file_write_size 32k;

    # Hide upstream X-Content-Type-Options so it is only emitted by nginx
    # (avoids duplicate header when Next.js also adds it).
    proxy_hide_header X-Content-Type-Options;

    # Proxy cache
    proxy_cache alloemmanuals_cache;
    proxy_cache_valid 200 301 1h;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_methods GET HEAD;
    # Vary cache on Accept (markdown negotiation) and Authorization (paid API) so
    # markdown responses and authenticated paid feeds are never served to the
    # wrong client from the nginx cache.
    proxy_cache_key $scheme$request_method$host$request_uri$http_accept$http_authorization;
    add_header X-Cache-Status $upstream_cache_status always;

    # Rate limit aggressive crawlers
    limit_req zone=botlimit burst=50 nodelay;

    # Cache tools pages aggressively — mostly static spec content
    location ^~ /tools {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ignore_headers Cache-Control;
        proxy_hide_header Cache-Control;
        proxy_hide_header Vary;
        add_header Cache-Control "public, max-age=3600, s-maxage=3600" always;
        add_header Vary "Accept-Encoding" always;
        proxy_cache_valid 200 301 1h;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Cache repair pages moderately — reduces LCP and server load
    location ^~ /repair {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ignore_headers Cache-Control;
        proxy_hide_header Cache-Control;
        proxy_hide_header Vary;
        add_header Cache-Control "public, max-age=1800, s-maxage=1800" always;
        add_header Vary "Accept-Encoding" always;
        proxy_cache_valid 200 301 30m;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Do NOT cache API routes
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        send_timeout 180s;
        proxy_cache off;
    }

    # Explicit content-types for crawlers — cache MUST be off to prevent
    # Tollbit 302 redirects from being cached and served to normal users.
    location = /robots.txt {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header Content-Type;
        add_header Content-Type text/plain;
        proxy_cache off;
    }

    location ~* /sitemap {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache off;
    }

    # Redirects for top AI-cited 404 pages (May 20 2026)
    location = /tools/chevrolet-traverse-spark-plug-type { return 301 /tools/chevrolet-traverse-tire-size; }
    location = /tools/subaru-wrx-serpentine-belt { return 301 /manual/Subaru; }
    location = /tools/chevrolet-equinox-spark-plug-type { return 301 /manual/Chevrolet; }
    # Canonicalize legacy Honda CR-V repair URLs.
    location ~ "^/repair/([0-9]{4})/honda/cr-v(/.*)?$" { return 301 /repair/$1/honda/crv$2; }

    # Route53 health check is misconfigured to hit an Elasticsearch endpoint.
    # Return 200 here so the health check passes while AWS is fixed separately.
    # Only the Amazon Route53 health-check UA is allowed; all other probes still 404.
    location = /_nodes/_local {
        if ($http_user_agent ~* "Amazon-Route53-Health-Check-Service") {
            add_header Content-Type "application/json" always;
            return 200 '{"status":"ok","note":"Route53 health check endpoint"}';
        }
        return 444;
    }

    # Chrome privacy sandbox hint — return 204 No Content instead of 404.
    location = /.well-known/traffic-advice {
        add_header Content-Type "application/json" always;
        return 204;
    }

    # Drop common vulnerability probes at the edge without touching Next.js.
    location ~* "^/(\.env|\.git/|\.aws/|\.config/|\.claude/|\.credentials|wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|phpunit|vendor/|admin/|admin\.php|phpmyadmin|mysql\.sql|debug\.log|_nodes/|classwithtostring\.php|officialsite|ipfs/|api/v1/courses)" {
        return 444;
    }

    # Silence common static-file probes with tiny 204 instead of hitting Next.js.
    location = /apple-touch-icon-precomposed.png { return 204; }
    location = /apple-touch-icon.png { return 204; }

    # Drop non-GET/HEAD requests to the homepage — they are always probes.
    location = / {
        if ($request_method !~ ^(GET|HEAD)$) { return 444; }
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ignore_headers Cache-Control;
        proxy_hide_header Cache-Control;
        proxy_hide_header Vary;
        add_header Cache-Control "public, max-age=1800, s-maxage=1800" always;
        add_header Vary "Accept-Encoding" always;
    }

    # Cache everything else (vehicle hubs, manual pages, static marketing pages).
    # Next.js dynamic routes emit private/no-store headers; override them so
    # Cloudflare can cache the public HTML and origin load drops.
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        send_timeout 180s;
        proxy_ignore_headers Cache-Control;
        proxy_hide_header Cache-Control;
        proxy_hide_header Vary;
        add_header Cache-Control "public, max-age=1800, s-maxage=1800" always;
        add_header Vary "Accept-Encoding" always;
        proxy_cache_valid 200 301 30m;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name alloemmanuals.com www.alloemmanuals.com 116.202.210.109;

    # Redirect old domain traffic on HTTP too
    if ($host = spotonauto.com) { return 308 https://alloemmanuals.com$request_uri; }
    if ($host = www.spotonauto.com) { return 308 https://alloemmanuals.com$request_uri; }

    return 301 https://$host$request_uri;
}

