include /etc/nginx/cloudflare-allow.conf;

server {
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    server_name alloemmanuals.com www.alloemmanuals.com;

    # Block direct origin access — only Cloudflare + localhost allowed
    if ($cloudflare_trusted = 0) {
        return 444;
    }

    ssl_certificate /etc/letsencrypt/live/alloemmanuals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alloemmanuals.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Proxy cache
    proxy_cache alloemmanuals_cache;
    proxy_cache_valid 200 301 302 1h;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_methods GET HEAD;
    proxy_cache_key $scheme$request_method$host$request_uri;
    add_header X-Cache-Status $upstream_cache_status always;

    # Rate limit aggressive crawlers
    limit_req zone=botlimit burst=50 nodelay;

    # Cache tools pages aggressively — mostly static spec content
    location ^~ /tools {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ignore_headers Cache-Control;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=3600, s-maxage=3600" always;
        proxy_cache_valid 200 301 302 1h;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Cache repair pages moderately — reduces LCP and server load
    location ^~ /repair {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ignore_headers Cache-Control;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=1800, s-maxage=1800" always;
        proxy_cache_valid 200 301 302 30m;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Do NOT cache API routes
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        send_timeout 180s;
        proxy_cache off;
    }

    # Explicit content-types for crawlers
    location = /robots.txt {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header Content-Type;
        add_header Content-Type text/plain;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header Content-Type;
        add_header Content-Type application/xml;
    }

    # Redirects for top AI-cited 404 pages (May 20 2026)
    location = /tools/ford-fiesta-spark-plug-type { return 301 /tools/ford-fiesta-oil-type; }
    location = /tools/kia-sportage-serpentine-belt { return 301 /tools/kia-sportage-oil-type; }
    location = /tools/chevrolet-traverse-spark-plug-type { return 301 /tools/chevrolet-traverse-tire-size; }
    location = /tools/subaru-wrx-serpentine-belt { return 301 /manual/Subaru; }
    location = /tools/chevrolet-equinox-spark-plug-type { return 301 /manual/Chevrolet; }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        send_timeout 180s;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name alloemmanuals.com www.alloemmanuals.com 116.202.210.109;
    return 301 https://$host$request_uri;
}
