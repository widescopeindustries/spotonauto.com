include /etc/nginx/cloudflare-allow.conf;

# Bypass Nginx cache for AI bot requests — they get 302 redirects from
# Next.js middleware that must NOT be cached and served to normal users.
map $http_user_agent $is_ai_bot {
    default 0;
    
    # Exclude Googlebot and Bingbot from cache bypass so they get fast cached pages
    "~*googlebot"       0;
    "~*bingbot"         0;
    
    # Catch all other bots, crawlers, spiders, and scrapers
    "~*bot"             1;
    "~*crawl"           1;
    "~*spider"          1;
    "~*scraper"         1;
    "~*requests"        1;
    "~*python"          1;
    "~*curl"            1;
    "~*wget"            1;
    "~*httpclient"      1;
    "~*java"            1;
    "~*go-http"         1;
    "~*node"            1;
    "~*cohere"          1;
}

server {
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    server_name alloemmanuals.com www.alloemmanuals.com;

    # Block direct origin access — only Cloudflare + localhost allowed
    if ($cloudflare_trusted = 0) {
        return 444;
    }

    ssl_certificate /etc/letsencrypt/live/alloemmanuals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alloemmanuals.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Proxy cache
    proxy_cache alloemmanuals_cache;
    proxy_cache_valid 200 301 1h;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_methods GET HEAD;
    proxy_cache_key $scheme$request_method$host$request_uri;
    proxy_no_cache $is_ai_bot;
    proxy_cache_bypass $is_ai_bot;
    add_header X-Cache-Status $upstream_cache_status always;

    # Rate limit aggressive crawlers
    limit_req zone=botlimit burst=50 nodelay;

    # Cache tools pages aggressively — mostly static spec content
    location ^~ /tools {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ignore_headers Cache-Control;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=3600, s-maxage=3600" always;
        proxy_cache_valid 200 301 1h;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Cache repair pages moderately — reduces LCP and server load
    location ^~ /repair {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ignore_headers Cache-Control;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=1800, s-maxage=1800" always;
        proxy_cache_valid 200 301 30m;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Do NOT cache API routes
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        send_timeout 180s;
        proxy_cache off;
    }

    # Explicit content-types for crawlers — cache MUST be off to prevent
    # Tollbit 302 redirects from being cached and served to normal users.
    location = /robots.txt {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header Content-Type;
        add_header Content-Type text/plain;
        proxy_cache off;
    }

    location ~* /sitemap {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache off;
    }

    # Redirects for top AI-cited 404 pages (May 20 2026)
    location = /tools/chevrolet-traverse-spark-plug-type { return 301 /tools/chevrolet-traverse-tire-size; }
    location = /tools/subaru-wrx-serpentine-belt { return 301 /manual/Subaru; }
    location = /tools/chevrolet-equinox-spark-plug-type { return 301 /manual/Chevrolet; }
    # Canonicalize legacy Honda CR-V repair URLs.
    location ~ "^/repair/([0-9]{4})/honda/cr-v(/.*)?$" { return 301 /repair/$1/honda/crv$2; }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        send_timeout 180s;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name alloemmanuals.com www.alloemmanuals.com 116.202.210.109;
    return 301 https://$host$request_uri;
}
